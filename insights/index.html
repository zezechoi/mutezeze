<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mutezeze OS — Gallery</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Pretendard Variable','Pretendard','system-ui','sans-serif'] },
          colors: {
            bg:'#0E0C0A', bg2:'#161310', bg3:'#1E1A16', line:'#2A2420',
            ink:{0:'#F0EAE0', 1:'#C9BEAE', 2:'#8A7C6B', 3:'#6B5E50'},
            accent:'#C4753A', gold:'#D4A853'
          }
        }
      }
    };
  </script>
  <style>
    body { font-feature-settings:'ss01','ss02'; background:#0E0C0A; }
    .meta { font-variant-numeric: tabular-nums; letter-spacing:.02em; }
    .label { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#8A7C6B; font-weight:500; }

    /* masonry */
    .gallery { column-count: 4; column-gap: 10px; }
    @media (max-width:1024px){ .gallery { column-count: 3; } }
    @media (max-width:640px){ .gallery { column-count: 2; } }
    .shot {
      display:block; break-inside:avoid; margin-bottom:10px;
      position:relative; border-radius:8px; overflow:hidden;
      background:#161310; border:1px solid #2A2420;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .shot img { display:block; width:100%; height:auto; }
    .shot:hover { transform: translateY(-2px); border-color:#C4753A; box-shadow:0 8px 28px rgba(0,0,0,.5); }
    .shot .cap {
      position:absolute; left:0; right:0; bottom:0;
      padding:18px 12px 10px; font-size:11px; color:#F0EAE0;
      background:linear-gradient(to top, rgba(14,12,10,.85), rgba(14,12,10,0));
      opacity:0; transition:opacity .18s ease; letter-spacing:.01em;
    }
    .shot:hover .cap { opacity:1; }
    .skeleton { background:#1E1A16; border-radius:8px; margin-bottom:10px; break-inside:avoid; }
  </style>
</head>
<body class="text-ink-0 font-sans antialiased">

  <div class="max-w-6xl mx-auto px-6 pt-8">
    <div class="flex items-center justify-end text-xs meta text-ink-3">
      <span class="inline-flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></span>
        Live · Day <span data-live-day>1</span>
      </span>
    </div>
  </div>

  <nav class="max-w-6xl mx-auto px-6 mt-4 pb-4 border-b border-line">
    <ul class="flex flex-wrap gap-x-5 gap-y-2 text-sm text-ink-2">
      <li><a href="../index.html" class="hover:text-ink-0">Home</a></li>
      <li><a href="../today/index.html" class="hover:text-ink-0">Today</a></li>
      <li><a href="./index.html" class="text-gold underline underline-offset-4">Gallery</a></li>
      <li><a href="../diary/index.html" class="hover:text-ink-0">Library</a></li>
      <li><a href="../about/index.html" class="hover:text-ink-0">About</a></li>
      <li><a href="../index/index.html" class="hover:text-ink-0">Index</a></li>
    </ul>
  </nav>

  <header class="max-w-6xl mx-auto px-6 pt-14 pb-10">
    <div class="border-l-4 border-accent pl-4">
      <p class="text-sm meta text-accent mb-3">Visual archive</p>
      <h1 class="text-3xl md:text-4xl leading-tight font-semibold tracking-tight">
        쌓인 감각, 무드보드.
      </h1>
      <p class="mt-4 text-ink-2" id="gallery-meta">로딩 중…</p>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 pb-20">
    <!-- empty state -->
    <div id="empty-state" class="hidden text-center py-24">
      <div class="label mb-3 text-accent">Awaiting photos</div>
      <p class="text-ink-2 leading-relaxed max-w-md mx-auto">
        아직 사진이 없어요. 텔레그램에 캡쳐를 던지거나 일괄 업로드가 끝나면 여기에 무드보드로 쌓입니다.
      </p>
    </div>

    <!-- loading skeleton -->
    <div id="loading" class="gallery">
      <div class="skeleton" style="height:220px"></div>
      <div class="skeleton" style="height:300px"></div>
      <div class="skeleton" style="height:180px"></div>
      <div class="skeleton" style="height:260px"></div>
      <div class="skeleton" style="height:240px"></div>
      <div class="skeleton" style="height:200px"></div>
      <div class="skeleton" style="height:320px"></div>
      <div class="skeleton" style="height:190px"></div>
    </div>

    <!-- gallery -->
    <div id="gallery" class="gallery hidden"></div>

    <div id="more-wrap" class="hidden text-center mt-10">
      <button id="more-btn" class="text-sm meta text-ink-2 border border-line rounded-full px-6 py-2.5 hover:border-accent hover:text-gold transition">
        더 보기 <span id="more-count"></span>
      </button>
    </div>
  </main>

  <footer class="max-w-6xl mx-auto px-6 py-8 border-t border-line">
    <div class="flex justify-between text-sm meta text-ink-3">
      <span>Mutezeze OS</span>
      <span>mutezeze.vercel.app</span>
    </div>
  </footer>

  <!-- ===== Supabase live data ===== -->
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = '__SUPABASE_URL__';
    const SUPABASE_KEY = '__SUPABASE_ANON_KEY__';
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const PAGE = 60;
    let rows = [];
    let shown = 0;

    const galleryEl = document.getElementById('gallery');
    const loadingEl = document.getElementById('loading');
    const emptyEl = document.getElementById('empty-state');
    const moreWrap = document.getElementById('more-wrap');
    const moreBtn = document.getElementById('more-btn');
    const moreCount = document.getElementById('more-count');
    const metaEl = document.getElementById('gallery-meta');

    function renderNext() {
      const slice = rows.slice(shown, shown + PAGE);
      const html = slice.map(r => `
        <a href="../detail/?id=${encodeURIComponent(r.id)}" class="shot">
          <img src="${esc(r.image_url)}" loading="lazy" alt="${esc(r.title || '')}" />
          ${r.title ? `<span class="cap">${esc(r.title)}</span>` : ''}
        </a>
      `).join('');
      galleryEl.insertAdjacentHTML('beforeend', html);
      shown += slice.length;
      const remaining = rows.length - shown;
      if (remaining > 0) {
        moreWrap.classList.remove('hidden');
        moreCount.textContent = `(${remaining})`;
      } else {
        moreWrap.classList.add('hidden');
      }
    }

    moreBtn.addEventListener('click', renderNext);

    (async () => {
      try {
        const { data, error } = await sb
          .from('contents')
          .select('id, title, image_url, created_at')
          .not('image_url', 'is', null)
          .order('created_at', { ascending: false })
          .limit(1000);

        loadingEl.classList.add('hidden');

        if (error) { console.warn('gallery fetch error', error); emptyEl.classList.remove('hidden'); metaEl.textContent = '불러오기 실패'; return; }
        if (!data || data.length === 0) { emptyEl.classList.remove('hidden'); metaEl.textContent = '0 photos'; return; }

        rows = data;
        metaEl.textContent = `${data.length} photos · 던지면 쌓이는 시각 아카이브`;
        galleryEl.classList.remove('hidden');
        renderNext();
      } catch (e) {
        console.warn('gallery failed', e);
        loadingEl.classList.add('hidden');
        emptyEl.classList.remove('hidden');
      }
    })();
  </script>

</body>
</html>
