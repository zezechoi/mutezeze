  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {

        extend: {
          fontFamily: { sans: ['Pretendard Variable','Pretendard','system-ui','sans-serif'] },
          colors: {
            cream:'#F4EFE6', creamBorder:'#E2D7BF', creamMuted:'#EDE6D6',
            rose:'#C76784', dustyRose:'#9F6463', wine:'#B5454C', coral:'#D77C56',
            mustard:'#D6A53D', sand:'#C9AC6F', taupe:'#897866', camel:'#9C7B57',
            olive:'#8C8754', moss:'#587749', forest:'#4F5E4D', teal:'#6E9696',
            slate:'#5E7691', petrol:'#3F6F86', plum:'#946683', purple:'#715378',
            ink:{900:'#111111',700:'#3a3a3a',500:'#6b6b6b',300:'#bdbdbd'},
            paper:{50:'#fafafa',100:'#f3f3f3',200:'#e8e8e8'}

  <style>
    body { font-feature-settings:'ss01','ss02'; }
    .meta { font-variant-numeric: tabular-nums; letter-spacing:.02em; }
    .label { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#6b6b6b; font-weight:500; }
    .chip { display:inline-block; padding:3px 10px; border-radius:9999px; font-size:12px; font-weight:500; }
    .tag { display:inline-block; padding:4px 10px; border-radius:6px; font-size:13px; background:#EDE6D6; color:#3a3a3a; }
    .body-text { white-space: pre-wrap; line-height: 1.9; word-break: keep-all; }
    .intro-para { font-size:17px; line-height:1.85; color:#3a3a3a; margin-bottom:32px; white-space: pre-wrap; word-break: keep-all; }
    .num-block { display:flex; gap:20px; padding:24px 0; border-top:1px solid #EDE6D6; }
    .num-block:first-of-type { border-top-color:#E2D7BF; }
    .num-badge { flex-shrink:0; width:36px; height:36px; border-radius:9999px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:600; background:#F4EFE6; color:#3a3a3a; font-variant-numeric: tabular-nums; }
    .num-headline { font-size:18px; font-weight:600; line-height:1.55; color:#111; margin-bottom:8px; word-break: keep-all; }
    .num-body { font-size:15px; line-height:1.9; color:#3a3a3a; white-space: pre-wrap; word-break: keep-all; }
    .closing-para { font-size:17px; line-height:1.85; color:#3a3a3a; margin-top:28px; padding-top:24px; border-top:1px solid #E2D7BF; white-space: pre-wrap; word-break: keep-all; font-weight:500; }
  </style>
</head>
<body class="bg-cream text-ink-900 font-sans antialiased">

  <div class="max-w-3xl mx-auto px-6 pt-8">
    <div class="flex items-center justify-end text-xs meta text-ink-500">
      <span class="inline-flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-mustard animate-pulse"></span>
        Live · Day 1
      </span>
    </div>
  </div>

  <nav class="max-w-3xl mx-auto px-6 mt-4 pb-4 border-b border-creamBorder">
    <ul class="flex flex-wrap gap-x-5 gap-y-2 text-sm text-ink-700">
      <li><a href="../index.html" class="hover:text-dustyRose">Home</a></li>
      <li><a href="../today/index.html" class="hover:text-mustard">Today</a></li>
      <li><a href="../insights/index.html" class="hover:text-petrol">Insights</a></li>
      <li><a href="../diary/index.html" class="hover:text-plum">Library</a></li>
      <li><a href="../about/index.html" class="hover:text-forest">About</a></li>
      <li><a href="../index/index.html" class="hover:text-wine">Index</a></li>
    </ul>
  </nav>

  <main class="max-w-3xl mx-auto px-6 pt-10 pb-16">

    <a href="../today/index.html" class="inline-flex items-center gap-2 text-sm meta text-ink-500 hover:text-ink-900 mb-8">
      ← Today
    </a>

    <div id="loading" class="text-ink-500 meta text-sm">로딩 중…</div>

    <article id="detail" class="hidden">
      <div class="flex flex-wrap items-center gap-3 mb-5">
        <span id="d-category" class="chip"></span>
        <span id="d-date" class="text-sm meta text-ink-500"></span>
      </div>

      <h1 id="d-title" class="text-3xl md:text-4xl leading-tight font-semibold tracking-tight border-l-4 pl-4"></h1>

      <div id="d-body" class="mt-12"></div>

      <div id="d-link-wrap" class="mt-8 hidden">
        <div class="label mb-2">Source</div>
        <a id="d-link" href="#" target="_blank" rel="noopener" class="text-sm meta text-petrol hover:underline break-all"></a>
      </div>

      <div id="d-tags-wrap" class="mt-10 pt-6 border-t border-creamBorder hidden">
        <div class="label mb-3">Tags</div>
        <div id="d-tags" class="flex flex-wrap gap-2"></div>
      </div>
    </article>

    <div id="not-found" class="hidden">
      <div class="border-l-4 border-wine pl-4">
        <p class="text-sm meta text-wine mb-3">Not found</p>
        <h1 class="text-2xl font-semibold">해당 인사이트를 찾을 수 없어요.</h1>
        <p class="mt-4 text-ink-700">링크가 잘못됐거나 항목이 삭제됐을 수 있습니다.</p>
        <a href="../today/index.html" class="inline-block mt-6 text-sm meta text-mustard hover:underline">← Today로 돌아가기</a>
      </div>
    </div>

  </main>

  <footer class="max-w-3xl mx-auto px-6 py-8 border-t border-creamBorder">
    <div class="flex justify-between text-sm meta text-ink-500">
      <span>Mutezeze OS</span>
      <span>zezechoi.github.io/mutezeze</span>
    </div>
  </footer>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://nnvubbnlxekudqaeiehw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5udnViYm5seGVrdWRxYWVpZWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NTk4MjMsImV4cCI6MjA5NDIzNTgyM30.ZE-KGcBdTwweceCHHB8omWHWzapErRNe3rwY-RxKmaQ';
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    const CAT_HEX = {
      '브랜드 분석':'#B5454C','글로벌 트렌드':'#3F6F86','강연 노트':'#D6A53D',
      '카피 라이브러리':'#946683','패키지 리서치':'#9C7B57','채널 운영':'#6E9696','크로스 산업':'#587749'
    };

    function fmtDate(s) {
      if (!s) return '';
      const d = new Date(s);
      if (isNaN(d)) return '';
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    }

    function setText(id, text) { document.getElementById(id).textContent = text; }

    const NUM_MARKERS = '①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳';
    const NUM_RE = new RegExp(`[${NUM_MARKERS}]`);
    const NUM_GLOBAL = new RegExp(`[${NUM_MARKERS}]`, 'g');

    function splitHeadlineBody(blockText) {
      // 우선순위 separator: 줄바꿈 > " — " > " → " > ": " > ". "
      // 길이 80자 이내 헤드라인만 인정
      const tries = ['\n', ' — ', ' → ', ': ', '. '];
      for (const sep of tries) {
        const i = blockText.indexOf(sep);
        if (i !== -1 && i > 0 && i < 80) {
          return {
            headline: blockText.slice(0, i).trim().replace(/[.,]$/, ''),
            body: blockText.slice(i + sep.length).trim()
          };
        }
      }
      // 짧으면 헤드라인만, 길면 헤드라인 + 본문 분리 못함
      return { headline: blockText.trim(), body: '' };
    }

    function parseInsightSegments(text) {
      if (!text || !NUM_RE.test(text)) return null;

      const segments = [];
      const positions = [];
      let m;
      NUM_GLOBAL.lastIndex = 0;
      while ((m = NUM_GLOBAL.exec(text)) !== null) {
        positions.push({ marker: m[0], idx: m.index });
      }

      // 첫 마커 이전 = intro
      if (positions[0].idx > 0) {
        const intro = text.slice(0, positions[0].idx).trim();
        if (intro) segments.push({ type: 'intro', text: intro });
      }

      // 각 마커 블록
      for (let i = 0; i < positions.length; i++) {
        const start = positions[i].idx + positions[i].marker.length;
        const end = (i + 1 < positions.length) ? positions[i + 1].idx : text.length;
        let blockText = text.slice(start, end).trim();

        // 다음 블록이 없고 마지막 줄에 "결론:" 같은 closing이 보이면 분리
        let closing = '';
        if (i === positions.length - 1) {
          const lines = blockText.split(/\n+/);
          if (lines.length > 1) {
            const lastLine = lines[lines.length - 1].trim();
            if (/^(결론|정리|Takeaway|takeaway|TAKEAWAY|결과|wrap|Wrap|WRAP)/.test(lastLine)) {
              closing = lastLine;
              blockText = lines.slice(0, -1).join('\n').trim();
            }
          }
        }

        segments.push({ type: 'numbered', marker: positions[i].marker, text: blockText });

        if (closing) segments.push({ type: 'closing', text: closing });
      }

      return segments;
    }

    function renderBody(insight) {
      const container = document.getElementById('d-body');
      if (!insight) { container.textContent = ''; return; }

      const segments = parseInsightSegments(insight);
      if (!segments) {
        // 번호 마커 없음 → 그냥 pre-wrap 단락
        container.className = 'mt-12 body-text text-ink-700';
        container.textContent = insight;
        return;
      }

      container.className = 'mt-12';
      const html = segments.map(seg => {
        if (seg.type === 'intro') {
          return `<p class="intro-para">${escapeHtml(seg.text)}</p>`;
        }
        if (seg.type === 'closing') {
          return `<p class="closing-para">${escapeHtml(seg.text)}</p>`;
        }
        // numbered
        const { headline, body } = splitHeadlineBody(seg.text);
        return `
          <div class="num-block">
            <div class="num-badge">${escapeHtml(seg.marker)}</div>
            <div class="flex-1 min-w-0">
              <div class="num-headline">${escapeHtml(headline)}</div>
              ${body ? `<div class="num-body">${escapeHtml(body)}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
      container.innerHTML = html;
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function showNotFound(reason) {
      console.warn('detail not found', reason);
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('not-found').classList.remove('hidden');
    }

    (async () => {
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      if (!id) return showNotFound('no id');

      const { data, error } = await sb.from('contents').select('*').eq('id', id).maybeSingle();
      if (error || !data) return showNotFound(error || 'no row');

      const hex = CAT_HEX[data.category] || '#897866';
      const cat = document.getElementById('d-category');
      cat.textContent = data.category || '미분류';
      cat.style.background = `${hex}1A`;
      cat.style.color = hex;

      const dateStr = fmtDate(data.date) || fmtDate(data.created_at);
      setText('d-date', dateStr);

      const title = document.getElementById('d-title');
      title.textContent = data.title || '(제목 없음)';
      title.style.borderColor = hex;

      document.title = `${data.title || '인사이트'} — Mutezeze OS`;

      renderBody(data.insight || '');

      if (data.link) {
        document.getElementById('d-link-wrap').classList.remove('hidden');
        const a = document.getElementById('d-link');
        a.href = data.link;
        a.textContent = data.link;
      }

      if (Array.isArray(data.tags) && data.tags.length) {
        document.getElementById('d-tags-wrap').classList.remove('hidden');
        const tags = document.getElementById('d-tags');
        for (const t of data.tags) {
          const el = document.createElement('span');
          el.className = 'tag';
          el.textContent = t;
          tags.appendChild(el);
        }
      }

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('detail').classList.remove('hidden');
    })();
  </script>

</body>
</html>
