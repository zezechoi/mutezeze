<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mutezeze OS — Insight Gallery</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Pretendard Variable','Pretendard','system-ui','sans-serif'] },
          colors: {
            bg:'#0E0C0A', bg2:'#161310', bg3:'#1E1A16', line:'#2A2420',
            ink:{0:'#F0EAE0', 1:'#C9BEAE', 2:'#8A7C6B', 3:'#6B5E50'},
            accent:'#C4753A', gold:'#D4A853'
          }
        }
      }
    };
  </script>
  <style>
    html, body { background:#0E0C0A; }
    body { font-feature-settings:'ss01','ss02'; }
    .meta { font-variant-numeric: tabular-nums; letter-spacing:.02em; }
    .label { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#8A7C6B; font-weight:500; }

    /* uniform grid */
    .grid-gallery {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap:8px;
    }
    @media (max-width:640px){ .grid-gallery { grid-template-columns: repeat(2, 1fr); } }
    .cell {
      position:relative; aspect-ratio:1/1; overflow:hidden; border-radius:8px;
      background:#161310; border:1px solid #2A2420; cursor:zoom-in;
      transition: transform .16s ease, border-color .16s ease;
    }
    .cell img { width:100%; height:100%; object-fit:cover; display:block; transition: transform .3s ease; }
    .cell:hover { border-color:#C4753A; transform: translateY(-2px); }
    .cell:hover img { transform: scale(1.05); }
    .cell .cap {
      position:absolute; inset:auto 0 0 0; padding:16px 10px 8px;
      font-size:11px; color:#F0EAE0; opacity:0; transition:opacity .16s ease;
      background:linear-gradient(to top, rgba(14,12,10,.9), rgba(14,12,10,0));
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .cell:hover .cap { opacity:1; }

    /* lightbox */
    #lightbox { background:rgba(8,7,6,.94); backdrop-filter: blur(4px); }
    #lightbox img { max-width:92vw; max-height:82vh; object-fit:contain; border-radius:6px; box-shadow:0 20px 60px rgba(0,0,0,.6); }
    .lb-btn { position:fixed; top:50%; transform:translateY(-50%); width:48px; height:48px; border-radius:9999px;
      background:rgba(30,26,22,.7); border:1px solid #2A2420; color:#F0EAE0; font-size:20px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; transition:background .15s; }
    .lb-btn:hover { background:#C4753A; }

    .skeleton { aspect-ratio:1/1; background:#1E1A16; border-radius:8px; animation:pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
  </style>
</head>
<body class="text-ink-0 font-sans antialiased">

  <!-- Top bar -->
  <div class="max-w-7xl mx-auto px-6 pt-8">
    <div class="flex items-center justify-between gap-4">
      <span class="text-sm font-semibold tracking-tight">Mutezeze OS</span>
      <span class="inline-flex items-center gap-2 text-xs meta text-ink-3">
        <span class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></span>
        Live · Day <span data-live-day>1</span>
      </span>
    </div>
  </div>

  <!-- Header + search -->
  <header class="max-w-7xl mx-auto px-6 pt-12 pb-8">
    <div class="border-l-4 border-accent pl-4 mb-8">
      <p class="text-sm meta text-accent mb-3">Insight gallery</p>
      <h1 class="text-3xl md:text-4xl leading-tight font-semibold tracking-tight">
        인사이트가 된 장면들.
      </h1>
      <p class="mt-4 text-ink-2" id="meta">로딩 중…</p>
    </div>

    <div class="relative max-w-xl">
      <input id="search" type="search" placeholder="제목·태그로 검색…" autocomplete="off"
        class="w-full bg-bg2 border border-line rounded-full pl-12 pr-4 py-3 text-ink-0 placeholder-ink-3 text-sm
               focus:outline-none focus:border-accent transition" />
      <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-ink-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
      </svg>
    </div>
  </header>

  <!-- Gallery -->
  <main class="max-w-7xl mx-auto px-6 pb-20">
    <div id="loading" class="grid-gallery">
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>

    <div id="empty" class="hidden text-center py-24">
      <div class="label mb-3 text-accent">No photos</div>
      <p class="text-ink-2" id="empty-msg">아직 사진이 없어요.</p>
    </div>

    <div id="grid" class="grid-gallery hidden"></div>

    <div id="more-wrap" class="hidden text-center mt-10">
      <button id="more-btn" class="text-sm meta text-ink-2 border border-line rounded-full px-6 py-2.5 hover:border-accent hover:text-gold transition">
        더 보기 <span id="more-count"></span>
      </button>
    </div>
  </main>

  <footer class="max-w-7xl mx-auto px-6 py-8 border-t border-line">
    <div class="flex justify-between text-sm meta text-ink-3">
      <span>Mutezeze OS · Zeze Choi</span>
      <span>mutezeze.vercel.app</span>
    </div>
  </footer>

  <!-- Lightbox -->
  <div id="lightbox" class="fixed inset-0 z-50 hidden items-center justify-center p-6">
    <button id="lb-close" class="lb-btn" style="right:20px;top:20px;transform:none;">✕</button>
    <button id="lb-prev" class="lb-btn" style="left:20px;">‹</button>
    <button id="lb-next" class="lb-btn" style="right:20px;">›</button>
    <figure class="text-center">
      <img id="lb-img" src="" alt="" />
      <figcaption id="lb-cap" class="mt-4 text-sm text-ink-1 meta"></figcaption>
    </figure>
  </div>

  <!-- ===== Supabase live data ===== -->
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = '__SUPABASE_URL__';
    const SUPABASE_KEY = '__SUPABASE_ANON_KEY__';
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const PAGE = 60;

    let all = [];        // all rows
    let filtered = [];   // after search
    let shown = 0;

    const loadingEl = document.getElementById('loading');
    const gridEl = document.getElementById('grid');
    const emptyEl = document.getElementById('empty');
    const emptyMsg = document.getElementById('empty-msg');
    const metaEl = document.getElementById('meta');
    const moreWrap = document.getElementById('more-wrap');
    const moreBtn = document.getElementById('more-btn');
    const moreCount = document.getElementById('more-count');
    const searchEl = document.getElementById('search');

    function cellHtml(r, idx) {
      return `
        <div class="cell" data-idx="${idx}">
          <img src="${esc(r.image_url)}" loading="lazy" alt="${esc(r.title || '')}" />
          ${r.title ? `<span class="cap">${esc(r.title)}</span>` : ''}
        </div>`;
    }

    function resetGrid() {
      gridEl.innerHTML = '';
      shown = 0;
      renderNext();
    }

    function renderNext() {
      const slice = filtered.slice(shown, shown + PAGE);
      gridEl.insertAdjacentHTML('beforeend', slice.map((r) => cellHtml(r, all.indexOf(r))).join(''));
      shown += slice.length;
      const remaining = filtered.length - shown;
      moreWrap.classList.toggle('hidden', remaining <= 0);
      if (remaining > 0) moreCount.textContent = `(${remaining})`;
    }

    function applySearch(q) {
      q = q.trim().toLowerCase();
      filtered = !q ? all : all.filter(r => {
        const hay = `${r.title || ''} ${(r.tags||[]).join(' ')} ${r.category || ''}`.toLowerCase();
        return hay.includes(q);
      });
      gridEl.classList.toggle('hidden', filtered.length === 0);
      emptyEl.classList.toggle('hidden', filtered.length !== 0);
      if (filtered.length === 0) emptyMsg.textContent = `"${q}" 검색 결과가 없어요.`;
      metaEl.textContent = q ? `${filtered.length} / ${all.length} photos` : `${all.length} photos · 던지면 쌓이는 시각 아카이브`;
      resetGrid();
    }

    let searchTimer;
    searchEl.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => applySearch(searchEl.value), 180);
    });
    moreBtn.addEventListener('click', renderNext);

    // ── Lightbox ──
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCap = document.getElementById('lb-cap');
    let lbIndex = -1;

    function openLightbox(idx) {
      lbIndex = idx;
      const r = all[idx];
      if (!r) return;
      lbImg.src = r.image_url;
      lbCap.textContent = r.title || '';
      lb.classList.remove('hidden');
      lb.classList.add('flex');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lb.classList.add('hidden');
      lb.classList.remove('flex');
      lbImg.src = '';
      document.body.style.overflow = '';
    }
    function step(dir) {
      // navigate within filtered set
      const pos = filtered.indexOf(all[lbIndex]);
      const next = filtered[pos + dir];
      if (next) openLightbox(all.indexOf(next));
    }

    gridEl.addEventListener('click', (e) => {
      const cell = e.target.closest('.cell');
      if (cell) openLightbox(parseInt(cell.dataset.idx, 10));
    });
    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', (e) => { e.stopPropagation(); step(-1); });
    document.getElementById('lb-next').addEventListener('click', (e) => { e.stopPropagation(); step(1); });
    lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); }); // 바깥 클릭
    document.addEventListener('keydown', (e) => {
      if (lb.classList.contains('hidden')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') step(-1);
      else if (e.key === 'ArrowRight') step(1);
    });

    // ── Load ──
    (async () => {
      try {
        const { data, error } = await sb
          .from('contents')
          .select('id, title, image_url, tags, category, created_at')
          .not('image_url', 'is', null)
          .order('created_at', { ascending: false })
          .limit(1000);

        loadingEl.classList.add('hidden');
        if (error) { console.warn('gallery error', error); emptyEl.classList.remove('hidden'); emptyMsg.textContent='불러오기 실패'; metaEl.textContent=''; return; }
        if (!data || data.length === 0) { emptyEl.classList.remove('hidden'); metaEl.textContent='0 photos'; return; }

        all = data;
        filtered = data;
        metaEl.textContent = `${data.length} photos · 던지면 쌓이는 시각 아카이브`;
        gridEl.classList.remove('hidden');
        renderNext();
      } catch (e) {
        console.warn('gallery failed', e);
        loadingEl.classList.add('hidden');
        emptyEl.classList.remove('hidden');
      }
    })();
  </script>

</body>
</html>
